# nginx.conf - gestionado por deploy.ps1
# Config ahora vive dentro de tools/nginx/<ver>/conf/ (o nginx-current/conf/)
# Editar aqui o en sites-enabled/*.conf dentro de la misma carpeta.

worker_processes  auto;
error_log         "{{logPath}}/error.log" warn;
pid               "{{logPath}}/nginx.pid";

events {
    worker_connections  1024;
}

http {
    include       "{{currentPath}}/conf/mime.types";
    default_type  application/octet-stream;

    access_log  "{{logPath}}/access.log";

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    client_max_body_size 50m;

    # vhosts: coloca tus .conf en conf/sites-enabled/*.conf (relativo al current)
    include "{{configPath}}/sites-enabled/*.conf";
}
